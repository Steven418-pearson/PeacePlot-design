<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#F8F9FA" />
  <title>Create account · PeacePlot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
  <div class="auth-shell">
    <div class="auth-header-slab">
      <header class="auth-site-header">
        <a class="auth-brand-lockup" href="index.html">
          <div class="auth-brand-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M12 3c-1.5 3-4 5-7 5v8c3 0 5.5 2 7 5 1.5-3 4-5 7-5V8c-3 0-5.5-2-7-5z" />
            </svg>
          </div>
          <div class="auth-brand-text">
            <strong><span class="brand-titlefx">PeacePlot</span> <span class="brand-titlefx__ai">AI</span></strong>
            <small>Calm · clarity · care</small>
          </div>
        </a>
        <a class="auth-header-back" href="index.html" aria-label="Back to home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </a>
      </header>
      <p class="auth-header-kicker">Account</p>
    </div>

    <main class="auth-card">
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Join PeacePlot AI — same sign-in options as below.</p>

      <div class="auth-oauth">
        <button type="button" class="oauth-btn oauth-btn--google" id="oauth-google" aria-label="Continue with Google">
          <span class="oauth-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
          </span>
          <span>Continue with Google</span>
        </button>

        <button type="button" class="oauth-btn oauth-btn--microsoft" id="oauth-microsoft" aria-label="Continue with Microsoft">
          <span class="oauth-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 23 23" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
              <path fill="#f25022" d="M1 1h10v10H1z"/>
              <path fill="#00a4ef" d="M12 1h10v10H12z"/>
              <path fill="#7fba00" d="M1 12h10v10H1z"/>
              <path fill="#ffb900" d="M12 12h10v10H12z"/>
            </svg>
          </span>
          <span>Continue with Microsoft</span>
        </button>
      </div>

      <div class="auth-divider"><span>or</span></div>

      <form class="auth-form" id="form-signup" novalidate>
        <label for="signup-email">Email</label>
        <input
          id="signup-email"
          name="email"
          type="email"
          autocomplete="email"
          inputmode="email"
          required
          placeholder="you@example.com"
        />

        <label for="signup-password">Password</label>
        <input
          id="signup-password"
          name="password"
          type="password"
          autocomplete="new-password"
          required
          minlength="8"
          placeholder="At least 8 characters"
        />

        <label for="signup-password2">Confirm password</label>
        <input
          id="signup-password2"
          name="password2"
          type="password"
          autocomplete="new-password"
          required
          placeholder="Repeat password"
        />

        <label class="auth-check">
          <input type="checkbox" id="signup-terms" name="terms" required />
          <span>I agree to the <a href="#" id="link-terms">Terms</a> and privacy policy.</span>
        </label>

        <button type="submit" class="btn-primary-auth">Create account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="sign-in.html">Sign in</a></p>
    </main>
  </div>

  <div class="auth-toast" id="auth-toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      var toast = document.getElementById("auth-toast");
      var t;

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("visible");
        clearTimeout(t);
        t = setTimeout(function () {
          toast.classList.remove("visible");
        }, 2800);
      }

      document.getElementById("oauth-google").addEventListener("click", function () {
        showToast("Google sign-up will connect when the app is linked to a server.");
      });

      document.getElementById("oauth-microsoft").addEventListener("click", function () {
        showToast("Microsoft sign-up will connect when the app is linked to a server.");
      });

      document.getElementById("link-terms").addEventListener("click", function (e) {
        e.preventDefault();
        showToast("Terms page coming soon.");
      });

      document.getElementById("form-signup").addEventListener("submit", function (e) {
        e.preventDefault();
        var email = document.getElementById("signup-email").value.trim();
        var pw = document.getElementById("signup-password").value;
        var pw2 = document.getElementById("signup-password2").value;
        var terms = document.getElementById("signup-terms").checked;
        if (!email || !pw) {
          showToast("Please fill in email and password.");
          return;
        }
        if (pw !== pw2) {
          showToast("Passwords do not match.");
          return;
        }
        if (!terms) {
          showToast("Please accept the Terms to continue.");
          return;
        }
        showToast("Email sign-up will be available when accounts go live.");
      });
    })();
  </script>
</body>
</html>
