<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#F8F9FA" />
  <title>Sign in · PeacePlot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
  <div class="auth-shell">
    <header class="auth-header">
      <a class="auth-back" href="index.html">← Home</a>
      <a class="auth-brand" href="index.html">PeacePlot AI</a>
      <p class="auth-kicker">Account</p>
    </header>

    <main class="auth-card">
      <h1 class="auth-title">Sign in</h1>
      <p class="auth-sub">Welcome back — pick your sign-in method.</p>

      <div class="auth-oauth">
        <button type="button" class="oauth-btn oauth-btn--google" id="oauth-google" aria-label="Continue with Google">
          <span class="oauth-btn__icon" aria-hidden="true">
            <!-- Google “G” logo (brand colors) -->
            <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
          </span>
          <span>Continue with Google</span>
        </button>

        <button type="button" class="oauth-btn oauth-btn--microsoft" id="oauth-microsoft" aria-label="Continue with Microsoft">
          <span class="oauth-btn__icon" aria-hidden="true">
            <!-- Microsoft logo (four squares) -->
            <svg viewBox="0 0 23 23" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
              <path fill="#f25022" d="M1 1h10v10H1z"/>
              <path fill="#00a4ef" d="M12 1h10v10H12z"/>
              <path fill="#7fba00" d="M1 12h10v10H1z"/>
              <path fill="#ffb900" d="M12 12h10v10H12z"/>
            </svg>
          </span>
          <span>Continue with Microsoft</span>
        </button>
      </div>

      <div class="auth-divider"><span>or</span></div>

      <form class="auth-form" id="form-signin" novalidate>
        <label for="signin-email">Email</label>
        <input
          id="signin-email"
          name="email"
          type="email"
          autocomplete="email"
          inputmode="email"
          required
          placeholder="you@example.com"
        />

        <label for="signin-password">Password</label>
        <input
          id="signin-password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          placeholder="••••••••"
        />

        <button type="submit" class="btn-primary-auth">Sign in</button>
        <a class="auth-forgot" href="#" id="link-forgot">Forgot password?</a>
      </form>

      <p class="auth-switch">No account? <a href="sign-up.html">Create one</a></p>
    </main>
  </div>

  <div class="auth-toast" id="auth-toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      var toast = document.getElementById("auth-toast");
      var t;

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("visible");
        clearTimeout(t);
        t = setTimeout(function () {
          toast.classList.remove("visible");
        }, 2800);
      }

      document.getElementById("oauth-google").addEventListener("click", function () {
        showToast("Google sign-in will connect when the app is linked to a server.");
      });

      document.getElementById("oauth-microsoft").addEventListener("click", function () {
        showToast("Microsoft sign-in will connect when the app is linked to a server.");
      });

      document.getElementById("form-signin").addEventListener("submit", function (e) {
        e.preventDefault();
        var email = document.getElementById("signin-email").value.trim();
        var pw = document.getElementById("signin-password").value;
        if (!email || !pw) {
          showToast("Please enter email and password.");
          return;
        }
        showToast("Email sign-in will be available when accounts go live.");
      });

      document.getElementById("link-forgot").addEventListener("click", function (e) {
        e.preventDefault();
        showToast("Password reset coming soon.");
      });
    })();
  </script>
</body>
</html>
