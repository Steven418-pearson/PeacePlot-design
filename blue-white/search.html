<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#F8F9FA" />
  <title>Search · PeacePlot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f9fa;
      --ink: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --page-bg-image: url("assets/nour-elhakim-CsiFAKKBwUc-unsplash.jpg");
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: Inter, system-ui, sans-serif;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(248, 249, 250, 0.3), rgba(248, 249, 250, 0.3)),
        var(--page-bg-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      padding: 1rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom, 0px));
      max-width: 26rem;
      margin-left: auto;
      margin-right: auto;
    }
    .search-header {
      position: sticky;
      top: 0;
      z-index: 120;
      margin: -1rem -1.25rem 1.2rem;
      padding: calc(0.9rem + env(safe-area-inset-top, 0px)) 1.25rem 0.95rem;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.96) 0%, rgba(240, 247, 255, 0.93) 42%, rgba(224, 239, 255, 0.92) 100%);
      border-bottom: 1px solid rgba(37, 99, 235, 0.12);
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.08);
      backdrop-filter: blur(6px) saturate(120%);
      -webkit-backdrop-filter: blur(6px) saturate(120%);
    }
    a.back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--primary);
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      margin-bottom: 0.55rem;
    }
    a.back:hover { text-decoration: underline; }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0;
    }
    p {
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header class="search-header">
    <a class="back" href="index.html">← Home</a>
    <h1>Search</h1>
  </header>
  <p>Search page — replace this with your full search UI.</p>
</body>
</html>
